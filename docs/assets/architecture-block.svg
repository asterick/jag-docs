<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-label="Jaguar processor block diagram">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0.5" y="0.5" width="759" height="519" rx="8" fill="#fcfcfe" stroke="#d0d7de"/>

  <text x="380" y="34" text-anchor="middle" font-size="13" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">outside world — controllers, cartridge / CD, video, audio</text>

  <rect x="300" y="56" width="160" height="56" rx="6" fill="#e5e7eb" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="80" text-anchor="middle" font-size="15" fill="#0f172a" font-family="Segoe UI, system-ui, sans-serif" font-weight="700">68000 CPU</text>
  <text x="380" y="99" text-anchor="middle" font-size="12" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">manager · control flow</text>
  <line x1="380" y1="44" x2="380" y2="55" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>

  <line x1="380" y1="112" x2="380" y2="150" stroke="#475569" stroke-width="1.6"/>
  <line x1="150" y1="150" x2="610" y2="150" stroke="#475569" stroke-width="1.6"/>
  <line x1="150" y1="150" x2="150" y2="187" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="380" y1="150" x2="380" y2="187" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="610" y1="150" x2="610" y2="187" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="80" y="188" width="140" height="58" rx="6" fill="#dbeafe" stroke="#334155" stroke-width="1.5"/>
  <text x="150" y="212" text-anchor="middle" font-size="15" fill="#0f172a" font-family="Segoe UI, system-ui, sans-serif" font-weight="700">GPU</text>
  <text x="150" y="231" text-anchor="middle" font-size="12" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">Tom · 4 KB RAM</text>

  <rect x="310" y="188" width="140" height="58" rx="6" fill="#dbeafe" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="212" text-anchor="middle" font-size="15" fill="#0f172a" font-family="Segoe UI, system-ui, sans-serif" font-weight="700">Blitter</text>
  <text x="380" y="231" text-anchor="middle" font-size="12" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">Tom</text>

  <rect x="540" y="188" width="140" height="58" rx="6" fill="#ffedd5" stroke="#334155" stroke-width="1.5"/>
  <text x="610" y="212" text-anchor="middle" font-size="15" fill="#0f172a" font-family="Segoe UI, system-ui, sans-serif" font-weight="700">DSP</text>
  <text x="610" y="231" text-anchor="middle" font-size="12" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">Jerry · 8 KB RAM</text>

  <line x1="222" y1="210" x2="308" y2="210" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="308" y1="224" x2="222" y2="224" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="265" y="184" text-anchor="middle" font-size="11" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">tightly coupled</text>

  <line x1="150" y1="246" x2="298" y2="316" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <line x1="380" y1="246" x2="362" y2="316" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="205" y="288" text-anchor="middle" font-size="11" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">prepare bit-maps in memory</text>

  <rect x="250" y="318" width="220" height="60" rx="6" fill="#ede9fe" stroke="#334155" stroke-width="1.5"/>
  <text x="360" y="343" text-anchor="middle" font-size="15" fill="#0f172a" font-family="Segoe UI, system-ui, sans-serif" font-weight="700">Object Processor</text>
  <text x="360" y="362" text-anchor="middle" font-size="12" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">Tom — reads object list → line buffer</text>

  <line x1="360" y1="378" x2="360" y2="431" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="300" y="432" width="120" height="40" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="360" y="457" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Segoe UI, system-ui, sans-serif">video out</text>

  <line x1="610" y1="246" x2="610" y2="431" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="550" y="432" width="120" height="40" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="610" y="457" text-anchor="middle" font-size="14" fill="#0f172a" font-family="Segoe UI, system-ui, sans-serif">audio out</text>
</svg>
