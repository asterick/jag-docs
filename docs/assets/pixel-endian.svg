  <text x="648" y="92" text-anchor="end" font-size="11" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">right</text>
  <text x="24" y="138" font-size="13" fill="#475569" font-family="Segoe UI, system-ui, sans-serif" font-weight="600">Big-endian — left-most pixel = most significant</text>
  <text x="24" y="170" font-size="11" fill="#475569" font-family="Segoe UI, system-ui, sans-serif">left</text>
