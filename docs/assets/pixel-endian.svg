  <text x="219.0" y="170" text-anchor="middle" font-size="12" fill="#0f172a" font-family="Consolas, ui-monospace, monospace">47..40</text>
  <rect x="258" y="148" width="78" height="34" fill="#ffedd5" stroke="#94a3b8" stroke-width="1"/>
  <text x="297.0" y="170" text-anchor="middle" font-size="12" fill="#0f172a" font-family="Consolas, ui-monospace, monospace">39..32</text>
  <rect x="336" y="148" width="78" height="34" fill="#ffedd5" stroke="#94a3b8" stroke-width="1"/>
  <text x="375.0" y="170" text-anchor="middle" font-size="12" fill="#0f172a" font-family="Consolas, ui-monospace, monospace">31..24</text>
  <rect x="414" y="148" width="78" height="34" fill="#ffedd5" stroke="#94a3b8" stroke-width="1"/>
